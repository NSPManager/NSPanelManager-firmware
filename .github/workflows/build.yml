name: Build

on:
  push:
    branches:
      - 'main'

  pull_request:
    branches:
      - '**'

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build the project
        run: |
          make build